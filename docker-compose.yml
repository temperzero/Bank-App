services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: change-this-to-a-long-random-secret
      JWT_EXPIRES_IN: 1h
      MONGO_URI: mongodb://mongo:27017/bank
    depends_on:
      mongo:
        condition: service_started

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
